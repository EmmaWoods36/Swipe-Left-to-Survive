<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swipe Left to Survive v2</title>
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header id="topBar" class="top-bar">
      <div class="brand">
        <div class="brand-mark">♡</div>
        <div>
          <h1 data-i18n="title">Swipe Left to Survive</h1>
          <small data-i18n="tagline">A turn-based dating survival RPG</small>
        </div>
      </div>
      <div id="hud" class="hud"></div>
    </header>

    <main id="stage" class="stage">
      <div id="sceneBg" class="scene-bg"></div>
      <div id="screenLayer" class="screen-layer"></div>
      <div id="spriteLayer" class="sprite-layer"></div>
      <div id="fxLayer" class="fx-layer"></div>
      <div id="dialogueLayer" class="dialogue-layer hidden"></div>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
